name: CI

on:
  push:
    branches:
      - main
      - rc-*
      - release-*
  pull_request:

env:
  MAVEN_CLI_OPTS: "-f pom.xml -s maven/setting_ci.xml --batch-mode"
  MAVEN_OPTS: "-Dmaven.repo.local=.m2/repository"
  DOMAIN: martin.usegroup.de
  DOCKER_ENV_FILE: ./docker/.env

jobs:

  setup:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install XML tools
        run: sudo apt-get update && sudo apt-get install -y libxml2-utils

      - name: Extract version
        run: |
          MUSTANG_SERVER_VERSION=$(xmllint --xpath "//*[local-name()='project']/*[local-name()='version']/text()" pom.xml)
          echo "MUSTANG_SERVER_VERSION=$MUSTANG_SERVER_VERSION" >> $GITHUB_ENV
          echo "MUSTANG_SERVER_VERSION=$MUSTANG_SERVER_VERSION" > docker.env

      - uses: actions/upload-artifact@v4
        with:
          name: docker-env
          path: docker.env


  build:
    needs: setup
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Compile
        run: mvn $MAVEN_CLI_OPTS -DskipTests compile


  test:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Run Tests
        run: |
          mvn $MAVEN_CLI_OPTS \
          clean \
          org.jacoco:jacoco-maven-plugin:prepare-agent \
          test \
          org.jacoco:jacoco-maven-plugin:report

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: jacoco
          path: target/site/jacoco/jacoco.xml


  docker-build:
    if: github.ref == 'refs/heads/master'
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: docker-env

      - name: Load env
        run: |
          export $(cat docker.env | xargs)

      - name: Login registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        run: |
          docker build \
            -f docker/Dockerfile \
            --build-arg MUSTANG_SERVER_VERSION=$MUSTANG_SERVER_VERSION \
            -t ghcr.io/${{ github.repository }}:latest .

      - name: Push image
        run: |
          docker push ghcr.io/${{ github.repository }}:latest
